[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install --frozen-lockfile"]
dependsOn = ["setup"]

[phases.build]
cmds = ["cd apps/api && npx prisma generate && pnpm build"]
dependsOn = ["install"]

[start]
cmd = "node apps/api/dist/main.js"
